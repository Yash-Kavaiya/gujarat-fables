      - generic [ref=e37]:
        - paragraph [ref=e38]: The Solanki kings worshipped Surya, the sun, and so they built him a house that the sun itself could enter. At Modhera, on the banks of the Pushpavati, they raised a temple aligned not to the whims of fashion but to the geometry of the heavens — a building that is half prayer, half calculation.
        - paragraph [ref=e39]: "Approach it from the east and you meet the water first: the Surya Kund, a great stepped tank descending in a perfect cascade of terraces, dotted with more than a hundred small shrines. Pilgrims once purified themselves here before climbing toward the temple, moving from water to fire, from the human to the divine."
        - paragraph [ref=e40]: Beyond the tank stands the Sabha Mandap, the assembly hall, its fifty-two carved pillars counting out the weeks of the year. Every surface is worked — gods and dancers, elephants and lotus, the twelve Adityas marking the sun’s twelve moods across the months. Nothing here is merely decorative; the whole temple is a calendar you can walk through.
        - paragraph [ref=e41]: And then the masterstroke. The architects set the inner sanctum so exactly that at the equinox the first light of dawn travels the length of the temple and strikes the spot where the sun god’s image once stood, crowning him in his own element. Mathematics and devotion meet in a single beam of light, repeated faithfully twice a year for nearly a thousand years.
        - paragraph [ref=e42]: "Mahmud of Ghazni’s armies later defaced it, and the idol is long gone, but the alignment remains — indifferent to conquest, keyed only to the turning of the earth. This is the fable of Modhera: that the deepest faith is sometimes built with a surveyor’s precision, and that a people can pin their god to the sky so accurately that the sunrise itself becomes the act of worship."
