      - generic [ref=e31]:
        - paragraph [ref=e32]: Not every monument in Gujarat is ancient, and not every one is grief or conquest. Some are simply love, made large. In Morbi, beside a river, a ruler built a temple and named it for the one he could not bear to lose — Mani Mandir, the temple of Mani.
        - paragraph [ref=e33]: "In the 1930s the Thakor Saheb of Morbi raised this temple-palace, and into it he set the gods of household devotion: Radha and Krishna, Lakshmi and Narayan, Shiva and Parvati — the divine couples, deities who are never worshipped alone. The choice is its own quiet poem. A man who built a monument to his beloved filled it with gods who come in pairs."
        - paragraph [ref=e34]: The building wears its tenderness in stone. Pinnacles cluster like a crown; balconies and arches repeat in patient symmetry; every surface is worked with the carving that Gujarat’s craftsmen have practised for a thousand years, now turned to a thoroughly modern purpose. It has the scale of a palace and the heart of a shrine, and in the warm light of evening the carved facade seems almost to glow from within.
        - paragraph [ref=e35]: The great earthquake of 2001 shook Morbi hard and left parts of Mani Mandir wounded; much of the interior has been closed since. Yet the silhouette endures — the pinnacles still climb, the arches still hold, and the love that raised them is still legible in every deliberate line.
        - paragraph [ref=e36]: "This is the fable of the temple born of love: that devotion to the divine and devotion to a person are not so different after all — that a heart, given something it cannot keep, will sometimes answer by building something that will not fall, and writing a name across the sky in stone."
