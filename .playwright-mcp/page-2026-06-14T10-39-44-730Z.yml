      - generic [ref=e31]:
        - paragraph [ref=e32]: Once a year the sea remembers this place. The monsoon pushes inland across the marsh, and for a season the Rann becomes a shallow mirror of the sky. Then the water withdraws, the sun does its slow work, and what is left behind is salt — a white so total it erases the line between the ground and the heavens.
        - paragraph [ref=e33]: The people of Kutch have always read this emptiness as a kind of writing. The Agariyas, the salt-makers, walk out into the glare each winter and rake the crystallised earth into low ridges, harvesting the desert as others harvest a field. The Maldhari herders cross it with their camels, navigating by stars because there is nothing else to steer by. To the unprepared traveller it offers mirages; to those who belong here, it offers a horizon you can walk into.
        - paragraph [ref=e34]: When the full moon rises over the dry Rann, the salt catches the light and the whole plain begins to glow from beneath your feet, as if the ground had swallowed a second sky. It was this magic that gave birth to the Rann Utsav — a city of embroidered tents that blooms each winter, alive with the bhungas’ mirror-work, the drums of folk dancers, and the long shadows of camel caravans crossing an impossible white.
        - paragraph [ref=e35]: "There is an old feeling out here, older than any festival: the sense of standing at the very edge of the world, where the map simply stops and gives way to light. The Rann does not overwhelm you with detail. It overwhelms you with the absence of it — a vast, patient blankness that makes every tent, every lamp, every human voice feel precious and small."
        - paragraph [ref=e36]: "This is the fable of the white desert: that emptiness is not nothing. It is a canvas the people of Kutch have learned to fill — with salt and song, with mirrors and moonlight — proving that even where the earth turns blank, life insists on colouring it in."
