      - generic [ref=e31]:
        - paragraph [ref=e32]: When the old empire dissolved, the land it left behind was not one country but five hundred and sixty-two — princely states, each with its own crown, its own pride, its own reasons to stand apart. Some say a nation is born in a single great war. This one was born in quiet rooms, over cups of tea, in the patient voice of a man they called the Iron Man.
        - paragraph [ref=e33]: Sardar Vallabhbhai Patel was a farmer’s son from Gujarat who became the conscience of a young republic. He did not raise armies to unite the kingdoms; he raised arguments, appeals, and when needed, an unbending will. One by one the rajas signed away their thrones, and a map that had been a shattered mirror became, at last, a single reflecting whole.
        - paragraph [ref=e34]: Generations later, Gujarat chose to remember him not with a plaque but with a giant. On a river island below the Sardar Sarovar Dam, engineers and sculptors raised a figure twice the height of any statue the world had ever built — one hundred and eighty-two metres of bronze and steel, a number chosen to echo the seats of the state assembly that first dreamed of unity.
        - paragraph [ref=e35]: Stand at his feet and the Narmada spreads silver in every direction. The wind off the water moves the folds of his stone shawl. Look up and his gaze is fixed on the horizon, on the dam he believed could turn a dry country green, on the farms and the rivers and the people he spent his life refusing to let drift apart.
        - paragraph [ref=e36]: The fable of the Statue of Unity is not really about a statue. It is about the strange, stubborn idea that a thousand differences can be held inside one outline — that a country, like a colossus, is built piece by patient piece, and stands only because someone decided it must.
