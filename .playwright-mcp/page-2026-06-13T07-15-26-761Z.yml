      - generic [ref=e35]:
        - paragraph [ref=e36]: "They call it older than the Himalayas, and the geologists, for once, agree with the legend: Girnar is an ancient thing, a worn volcanic mountain rising abruptly from the plains of Saurashtra, sacred long before anyone wrote down why. To Jains and Hindus alike it is a mountain you do not merely visit. You climb it."
        - paragraph [ref=e37]: The way up is some ten thousand steps, cut into the rock and worn smooth by centuries of bare feet. Pilgrims begin before dawn, when the stone is cool and the peaks are still wrapped in mist, and they climb together — the old leaning on the young, porters carrying those who cannot walk, everyone breathing the same thin prayer toward the same high silence.
        - paragraph [ref=e38]: On the first great shoulder of the mountain stand the Jain temples, a marble city in the clouds. Chief among them is the shrine of Neminath, the twenty-second Tirthankara, who in tradition was kin to Krishna and who renounced the world here, on this very rock, turning back from his own wedding to seek something larger than a crown. Higher still waits the temple of Amba Mata, where newlyweds climb to ask a blessing, and higher again the peaks of Gorakhnath and Dattatreya, the loftiest points in all Gujarat.
        - paragraph [ref=e39]: The climb is the point. Each landing earns a wider horizon; each temple is a station on a journey that is as much inward as upward. The body labours, the breath shortens, the plains fall away below — and somewhere in the burning of the legs the pilgrimage stops being about the temple at the top and becomes about the climbing itself.
        - paragraph [ref=e40]: "This is the fable of the sacred mountain: that some truths cannot be delivered, only earned step by step; that Jain and Hindu, ancient and modern, the strong and the failing all ascend the same stairs toward the same sky — and that the mountain, indifferent and eternal, simply waits at the top for whoever is willing to come."
